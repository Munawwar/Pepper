<html>
    <head>
        <link rel="modulepreload" href="../../src/index.js" />
        <link rel="modulepreload" href="./page.js" />
        <style>
            body {
                font-family: sans-serif;
                line-height: 1.4;
                margin: 24px;
            }

            h1 {
                font-size: 20px;
                margin: 0 0 8px;
            }

            p {
                margin: 0 0 16px;
            }

            .demo {
                display: grid;
                gap: 12px;
            }

            .counter-block {
                display: grid;
                gap: 6px;
            }

            .counter-row {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }
        </style>
    </head>
    <body>
        <main class="demo">
            <h1>Pepper Hydration Demo</h1>
            <p>Click the button to confirm the server-rendered event handler hydrates correctly.</p>
            <div id="myview1"><div class="counter-block"><div>Interactive counter</div><div class="counter-row"><button on-click=0>Increase</button><span>Counter = 1</span></div></div></div>
            <div id="myview2"><div class="counter-block"><div>Mirrored counter</div><span>Counter = 1</span></div></div>
        </main>
        <script>window.initialState = {"count":1};</script>
        <script type="module">
            import initializePage from './page.js';
            const page = initializePage(window.initialState);
            page.view1.hydrate();
            page.view2.hydrate();
        </script>
    </body>
</html>
