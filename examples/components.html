<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Pepper components example</title>
		<style>
			:root {
				font-family: system-ui, sans-serif;
				color: #1f2937;
				background: #f3f4f6;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				padding: 24px;
			}

			#app {
				max-width: 760px;
				margin: 0 auto;
			}

			.demo-card {
				background: white;
				border: 1px solid #dbe3ee;
				border-radius: 14px;
				padding: 20px;
				box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
			}

			h1 {
				margin: 0 0 8px;
				font-size: 1.4rem;
			}

			.lede,
			.hint,
			.meta {
				color: #526171;
			}

			.lede,
			.hint {
				margin: 0 0 14px;
				line-height: 1.5;
			}

			.toolbar {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				margin-bottom: 14px;
			}

			button,
			input {
				font: inherit;
			}

			button {
				padding: 8px 12px;
				border: 1px solid #c7d2e0;
				border-radius: 10px;
				background: white;
				cursor: pointer;
			}

			.members {
				list-style: none;
				margin: 0;
				padding: 0;
				display: grid;
				gap: 10px;
			}

			.member {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 16px;
				padding: 12px 14px;
				border: 1px solid #d9e2ec;
				border-radius: 12px;
				background: #fcfdff;
				transition: box-shadow 140ms ease;
			}

			.member-copy,
			.member-controls {
				display: flex;
				align-items: center;
				gap: 10px;
				flex-wrap: wrap;
			}

			.tag {
				display: inline-flex;
				align-items: center;
				padding: 4px 10px;
				border-radius: 999px;
				font-size: 0.92rem;
				font-weight: 600;
			}

			.tag--sky {
				background: #e0f2fe;
				color: #075985;
			}

			.tag--mint {
				background: #dcfce7;
				color: #166534;
			}

			.tag--sand {
				background: #fef3c7;
				color: #92400e;
			}

			.tag--rose {
				background: #ffe4e6;
				color: #be123c;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="./components.js"></script>
	</body>
</html>
